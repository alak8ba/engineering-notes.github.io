<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-monitoring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#251108"/>
      <stop offset="100%" style="stop-color:#0F0703"/>
    </linearGradient>
    <filter id="glow-orange">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond hexagonal • cohérent avec les autres logos KORE -->
  <polygon points="100,8 178,52 178,148 100,192 22,148 22,52"
           fill="url(#bg-monitoring)" stroke="#E6522C" stroke-width="2"/>

  <!-- Hexagone intérieur décoratif -->
  <polygon points="100,28 162,63 162,137 100,172 38,137 38,63"
           fill="none" stroke="#E6522C" stroke-width="0.5" opacity="0.3"/>

  <!-- Symbole : sparkline (pulse de métriques) sur grille
       Zone verticale : y=55 (haut grille) → y=115 (axe X). Marge a KORE (y=148). -->

  <!-- Grille -->
  <g stroke="#E6522C" stroke-width="0.4" opacity="0.25">
    <line x1="60" y1="70"  x2="140" y2="70"/>
    <line x1="60" y1="85"  x2="140" y2="85"/>
    <line x1="60" y1="100" x2="140" y2="100"/>
    <line x1="60" y1="115" x2="140" y2="115"/>
    <line x1="140" y1="55" x2="140" y2="115"/>
  </g>

  <!-- Axes -->
  <g stroke="#E6522C" stroke-width="1" opacity="0.6" stroke-linecap="round">
    <line x1="60" y1="55"  x2="60"  y2="115"/>
    <line x1="60" y1="115" x2="140" y2="115"/>
  </g>

  <!-- Sparkline (courbe ascendante avec creux) -->
  <polyline points="65,108 77,98 89,104 101,82 113,90 125,68 137,75"
            fill="none" stroke="#E6522C" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#glow-orange)"/>

  <!-- Points de mesure -->
  <g fill="#E6522C" filter="url(#glow-orange)">
    <circle cx="65"  cy="108" r="2"/>
    <circle cx="89"  cy="104" r="2"/>
    <circle cx="113" cy="90"  r="2"/>
    <circle cx="137" cy="75"  r="2.5"/>
  </g>

  <!-- Texte KORE -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="700"
        font-size="20" fill="#E6522C" letter-spacing="3">KORE</text>

  <!-- Texte MONITORING -->
  <text x="100" y="166" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="400"
        font-size="9" fill="#E6522C" opacity="0.6" letter-spacing="3">MONITORING</text>
</svg>
